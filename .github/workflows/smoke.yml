name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python smoke checks
        run: |
          python - <<'PY'
          import compileall
          import importlib

          for path in ("client", "common", "server"):
              if not compileall.compile_dir(path, quiet=1):
                  raise SystemExit(f"Python compile check failed for {path}/")

          importlib.import_module("common.encryption")
          print("Python smoke checks passed.")
          PY
          python -m unittest discover -s tests
          python demos/run_all.py

  go-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go smoke tests
        run: go test ./...
